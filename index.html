<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP Spine Calculator</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: #ffffff;
            color: #222;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3a8a;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #f59e0b;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #d97706;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>KDP Master Pro</h2>
        
        <form id="spinecalculatorForm">
            <label for="width">Book Width (inch)</label>
            <input type="number" id="width" value="6" min="0.1" step="0.1" required>

            <label for="height">Book Height (inch)</label>
            <input type="number" id="height" value="9" min="0.1" step="0.1" required>

            <label for="pages">Pages</label>
            <input type="number" id="pages" value="100" min="1" required>

            <label for="paper">Paper Type</label>
            <select id="paper" required>
                <option value="white">White Paper</option>
                <option value="cream">Cream Paper</option>
            </select>

            <button type="submit">Calculate Spine</button>
        </form>

        <div class="result" id="result">
            Spine: 0 inch
        </div>
    </div>

    <script>
        const PAPER_THICKNESS = {
            white: 0.002252,
            cream: 0.0025
        };

        const form = document.getElementById('spinecalculatorForm');
        const resultElement = document.getElementById('result');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            calculate();
        });

        function calculate() {
            const pages = parseInt(document.getElementById("pages").value, 10);
            const paper = document.getElementById("paper").value;

            if (!pages || pages <= 0) {
                resultElement.textContent = 'Please enter a valid number of pages.';
                resultElement.style.color = '#dc2626';
                return;
            }

            resultElement.style.color = '#1e3a8a';
            const spine = pages * PAPER_THICKNESS[paper];
            resultElement.innerHTML = "Spine: " + spine.toFixed(3) + " inch";
        }
    </script>
</body>
</html>
