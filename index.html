<!DOCTYPE html>
<html>
<head>
<title>KDP Spine Calculator</title>
</head>

<body>

<h2>KDP Master Pro</h2>

<label>Width</label>
<input type="number">

<label>Height</label>
<input type="number">

<label>Pages</label>
<input type="number" id="pages">

<button onclick="calculate()">Calculate Now</button>

<p id="result"></p>

<script>
function calculate() {
let pages = document.getElementById("pages").value;
let spine = pages * 0.002252;
document.getElementById("result").innerHTML =
"Spine: " + spine.toFixed(3) + " inch";
}
</script>

</body>
</html>
